<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calendar</title>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            font-family: Arial, sans-serif;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .day {
            border: 1px solid #fff;
            padding: 10px;
        }
        .available {
            background-color: green;
        }
        .not-available {
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Interactive Calendar for May, June, July, August 2026</h1>
    <div class="calendar">
        <!-- Calendar Days -->
        <!-- Example for May - Fill in further as necessary -->
        <div class="day available">May 1<br>
            <input type="text" placeholder="10h-13h" />
            <input type="text" placeholder="14h-18h" />
            <input type="text" placeholder="19h-22h" />
        </div>
        <div class="day available">May 2<br>
            <input type="text" placeholder="10h-13h" />
            <input type="text" placeholder="14h-18h" />
            <input type="text" placeholder="19h-22h" />
        </div>
        <div class="day available">May 3<br>
            <input type="text" placeholder="10h-13h" />
            <input type="text" placeholder="14h-18h" />
            <input type="text" placeholder="19h-22h" />
        </div>
        <!-- Repeat this structure for each day through August 31 -->
    </div>
    <div class="legend">
        <h3>Legend:</h3>
        <div style="background-color: green;">OUI - Confirmed Availability</div>
        <div style="background-color: red;">NON - Not Available</div>
    </div>
</body>
</html>
